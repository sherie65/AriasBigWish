<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sherene Rance | Mermaid Aria</title>
  <meta name="description" content="Children's book author and cruise specialist. Get the book or plan your next adventure.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:  #309AAC;
      --pink:  #ED1566;
      --navy:  #092F37;
      --peach: #FFC9B9;
      --mint:  #E7F1F0;
    }

    html, body {
      min-height: 100%;
      min-height: 100dvh;
    }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--navy);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem 3rem;
    }

    /* ---- Logo ---- */
    .avatar {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 0.75rem;
    }

    /* ---- Name & tagline ---- */
    .name {
      font-family: 'Pacifico', cursive;
      font-size: 1.7rem;
      font-weight: 400;
      color: var(--teal);
      text-align: center;
      line-height: 1.2;
    }

    .tagline {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink);
      text-align: center;
      margin-top: 0.35rem;
      margin-bottom: 2.25rem;
    }

    /* ---- Cards ---- */
    .cards {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: var(--navy);
      display: flex;
      flex-direction: row;
      align-items: stretch;
      min-height: 160px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card-book   { background: var(--mint); }
    .card-cruise { background: var(--peach); }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 28px rgba(9,47,55,0.12);
      }
    }
    .card:active { transform: scale(0.98); }

    /* Text side */
    .card-body {
      flex: 1 1 0;
      padding: 1.25rem 1rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
      line-height: 1.25;
    }
    .card-book   .card-title { color: var(--teal); }
    .card-cruise .card-title { color: var(--pink); }

    .card-desc {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--navy);
      opacity: 0.7;
      line-height: 1.5;
      margin-bottom: 0.9rem;
      flex: 1;
    }

    /* Image side */
    .card-img-wrap {
      flex: 0 0 38%;
      max-width: 140px;
      overflow: hidden;
      position: relative;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Book cover — contain so full cover shows */
    .card-book .card-img-wrap img {
      object-fit: contain;
      background: var(--mint);
      padding: 0.5rem 0.25rem;
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-block;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      background: var(--pink);
      color: #fff;
      outline: 2px dashed rgba(255,255,255,0.55);
      outline-offset: -4px;
      transition: box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
      align-self: flex-start;
    }
    .btn:hover { box-shadow: 0 4px 14px rgba(237,21,102,0.4); }
    .btn:active { background: #fff; color: var(--pink); outline-color: rgba(237,21,102,0.45); }

    /* Cruise card — two CTAs stacked */
    .cruise-btns {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      align-items: flex-start;
    }

    .btn-secondary {
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--teal);
      text-decoration: underline;
      text-underline-offset: 2px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: color 0.15s ease;
    }
    .btn-secondary:hover { color: var(--navy); }

    /* ---- Footer ---- */
    .footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--navy);
      opacity: 0.3;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <img src="assets/img/logo.webp" alt="Mermaid Aria logo" class="avatar">

  <h1 class="name">Sherene Rance</h1>
  <p class="tagline">Author &nbsp;·&nbsp; Cruise Specialist</p>

  <div class="cards">

    <!-- Book card -->
    <a href="https://mermaidariastore.etsy.com" class="card card-book">
      <div class="card-body">
        <div>
          <p class="card-title">Get the Book</p>
          <p class="card-desc">Signed copies, merch, and bundles</p>
        </div>
        <span class="btn">Shop Now</span>
      </div>
      <div class="card-img-wrap">
        <img src="assets/img/book-cover-1.webp" alt="Aria's Big Wish book cover" loading="eager">
      </div>
    </a>

    <!-- Cruise card -->
    <div class="card card-cruise">
      <div class="card-body">
        <div>
          <p class="card-title">Plan a Cruise</p>
          <p class="card-desc">Family sailings and adults-only Virgin Voyages — book yourself or let me plan it for you</p>
        </div>
        <div class="cruise-btns">
          <a href="sms:+17184314889&body=Hi%20Sherene!%20I'm%20interested%20in%20planning%20a%20cruise%20%F0%9F%9A%A2" class="btn">Text Me to Plan Your Cruise</a>
          <a href="https://www.virginvoyages.com/book/voyage-planner/find-a-voyage?agencyId=354&agentId=189062&currencyCode=USD" class="btn-secondary">Or book Virgin Voyages yourself →</a>
        </div>
      </div>
      <div class="card-img-wrap">
        <img src="assets/img/hero.webp" alt="Mermaid Aria's ocean world" loading="eager">
      </div>
    </div>

  </div>

  <p class="footer">mermaidaria.com</p>

</body>
</html>
